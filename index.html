<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Ximier Atelier — Elegancia que trasciende. Prendas únicas confeccionadas a mano en nuestro atelier.">

<meta property="og:title" content="Ximier Atelier">
<meta property="og:description" content="Elegancia que trasciende. Prendas únicas hechas a mano.">
<meta property="og:type" content="website">

<title>Ximier | Elegancia que trasciende</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--bg-color:#0a0a0a;
--text-light:#f5f5f5;
--accent-gold:#d4af37;
--font-heading:'Playfair Display',serif;
--font-body:'Lato',sans-serif;
--transition:all .7s cubic-bezier(.23,1,.32,1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:var(--bg-color);
color:var(--text-light);
font-family:var(--font-body);
overflow-x:hidden;
line-height:1.6;
cursor:default;
}

a,button{
cursor:pointer;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px 5%;
position:fixed;
width:100%;
top:0;
z-index:1000;
background:rgba(10,10,10,.92);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(212,175,55,.12);
transition:var(--transition);
}

.navbar.scrolled{
padding:14px 5%;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.logo{
font-family:var(--font-heading);
font-size:1.85rem;
letter-spacing:7px;
color:var(--accent-gold);
text-transform:uppercase;
text-decoration:none;
}

.nav-links{
list-style:none;
display:flex;
gap:38px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:.78rem;
letter-spacing:2.5px;
text-transform:uppercase;
position:relative;
}

.nav-links a::after{
content:'';
position:absolute;
width:0;
height:1px;
bottom:-4px;
left:0;
background:var(--accent-gold);
transition:.4s;
}

.nav-links a:hover::after{
width:100%;
}

.nav-icons{
display:flex;
align-items:center;
gap:28px;
}

.cart-icon-container{
position:relative;
font-size:1.3rem;
}

#cart-count{
position:absolute;
top:-6px;
right:-10px;
background:var(--accent-gold);
color:black;
font-size:.68rem;
min-width:19px;
height:19px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.menu-toggle{
display:none;
font-size:1.3rem;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:0 20px;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1539008835657-9e8e9680c956?q=80&w=1920') center/cover no-repeat;
}

.hero-content h1{
font-family:var(--font-heading);
font-size:clamp(3.2rem,10vw,6.8rem);
letter-spacing:16px;
text-transform:uppercase;
margin-bottom:12px;
}

.hero-content p{
letter-spacing:6px;
color:#ccc;
margin-bottom:50px;
}

/* BOTÓN PREMIUM */

.btn-gold{
padding:19px 52px;
background:transparent;
color:var(--accent-gold);
border:1.5px solid var(--accent-gold);
text-decoration:none;
text-transform:uppercase;
letter-spacing:3px;
font-size:.82rem;
transition:var(--transition);
position:relative;
overflow:hidden;
}

.btn-gold:hover{
background:var(--accent-gold);
color:black;
}

.btn-gold::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
transition:.8s;
}

.btn-gold:hover::before{
left:100%;
}

/* SECCIONES */

.shop-section{
padding:110px 5%;
}

.section-title{
font-family:var(--font-heading);
text-align:center;
font-size:2.85rem;
margin-bottom:85px;
color:var(--accent-gold);
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:45px;
}

.product-card{
background:#111;
overflow:hidden;
transition:.5s;
}

.product-card:hover{
transform:translateY(-12px);
}

.img-container{
width:100%;
height:520px;
overflow:hidden;
}

.img-container img{
width:100%;
height:100%;
object-fit:cover;
transition:transform 1.4s ease;
}

.product-card:hover img{
transform:scale(1.08);
}

.product-info{
padding:32px;
text-align:center;
}

.price{
color:var(--accent-gold);
margin-bottom:28px;
}

.add-to-cart{
width:100%;
padding:16px;
background:#1a1a1a;
color:white;
border:1px solid #333;
}

.add-to-cart:hover{
background:var(--accent-gold);
color:black;
}

/* FADE */

.fade-in{
opacity:0;
transform:translateY(60px) scale(.98);
transition:1.2s cubic-bezier(.19,1,.22,1);
}

.fade-in.visible{
opacity:1;
transform:translateY(0) scale(1);
}

/* MOBILE */

@media(max-width:768px){

.nav-links{display:none;}

.menu-toggle{display:block;}

.hero-content h1{letter-spacing:8px;}

.hero-content p{letter-spacing:3px;}

}

</style>
</head>

<body>

<nav class="navbar" id="navbar">

<a class="logo">Ximier</a>

<ul class="nav-links">
<li><a href="#">Inicio</a></li>
<li><a href="#">Colección</a></li>
</ul>

<div class="nav-icons">

<div class="cart-icon-container" id="open-cart">
<i class="fas fa-shopping-bag"></i>
<span id="cart-count">0</span>
</div>

<div class="menu-toggle">
<i class="fas fa-bars"></i>
</div>

</div>
</nav>

<header class="hero">

<div class="hero-content fade-in">

<h1>Ximier</h1>

<p>Elegancia que trasciende</p>

<a href="#productos" class="btn-gold">Ver Colección</a>

</div>

</header>

<section class="shop-section" id="productos">

<h2 class="section-title fade-in">La Colección Nocturna</h2>

<div class="product-grid">

<div class="product-card fade-in">

<div class="img-container">
<img loading="lazy" src="https://images.unsplash.com/photo-1566162963464-3286f9014197?q=80&w=800">
</div>

<div class="product-info">

<h3>Seda Medianoche</h3>

<p class="price">$1,400 USD</p>

<button class="add-to-cart" data-name="Seda Medianoche" data-price="1400">Añadir</button>

</div>
</div>

<div class="product-card fade-in">

<div class="img-container">
<img loading="lazy" src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?q=80&w=800">
</div>

<div class="product-info">

<h3>Terciopelo Noir</h3>

<p class="price">$1,850 USD</p>

<button class="add-to-cart" data-name="Terciopelo Noir" data-price="1850">Añadir</button>

</div>
</div>

</div>
</section>

<script>

let cart=[]

function showToast(msg){

const toast=document.createElement("div")

toast.innerText=msg

toast.style.position="fixed"
toast.style.bottom="30px"
toast.style.right="30px"
toast.style.background="#d4af37"
toast.style.color="#000"
toast.style.padding="12px 22px"
toast.style.zIndex="5000"

document.body.appendChild(toast)

setTimeout(()=>toast.remove(),2000)

}

document.querySelectorAll(".add-to-cart").forEach(btn=>{

btn.onclick=(e)=>{

const name=e.target.dataset.name
const price=parseInt(e.target.dataset.price)

const existing=cart.find(item=>item.name===name)

if(existing){
existing.qty++
}else{
cart.push({name,price,qty:1})
}

showToast(name+" añadido a la bolsa")

updateUI()

}

})

function updateUI(){

let count=0

cart.forEach(i=>count+=i.qty)

document.getElementById("cart-count").innerText=count

}

const observer=new IntersectionObserver(entries=>{

entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("visible")
}
})

},{threshold:.15})

document.querySelectorAll(".fade-in").forEach(el=>observer.observe(el))

</script>

</body>
</html>
