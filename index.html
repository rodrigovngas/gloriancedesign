<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ximier Atelier — Elegancia que trasciende.">
    <title>Ximier | Elegancia que trasciende</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Stripe JS -->
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-light: #f5f5f5;
            --accent-gold: #d4af37;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Lato', sans-serif;
            --transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }
        /* MODO CLARO */
        .light-mode {
            --bg-color: #f8f5f0;
            --text-light: #1a1a1a;
            --accent-gold: #b38b1f;
        }
        .light-mode .navbar { background: rgba(248,245,240,0.95); }
        .light-mode .product-card { background: #fff; }
        .light-mode .btn-gold, .light-mode .checkout-btn { color: #1a1a1a; }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        /* === NAVEGACIÓN === */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 5%; position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(10,10,10,0.92); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212,175,55,0.12);
            transition: var(--transition);
        }
        .navbar.scrolled { padding: 14px 5%; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .logo { font-family: var(--font-heading); font-size: 1.85rem; letter-spacing: 7px; color: var(--accent-gold); text-decoration: none; }
        .nav-links { list-style: none; display: flex; gap: 38px; }
        .nav-links a { color: var(--text-light); text-decoration: none; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 2.5px; position: relative; }
        .nav-links a::after { content:''; position:absolute; width:0; height:1px; bottom:-4px; left:0; background:var(--accent-gold); transition:var(--transition); }
        .nav-links a:hover::after { width:100%; }

        .nav-icons { display: flex; align-items: center; gap: 24px; }
        .cart-icon-container, .theme-toggle { cursor: pointer; font-size: 1.35rem; color: var(--text-light); transition: var(--transition); }
        .cart-icon-container:hover, .theme-toggle:hover { color: var(--accent-gold); }
        #cart-count { position:absolute; top:-6px; right:-10px; background:var(--accent-gold); color:#000; font-size:0.68rem; font-weight:700; min-width:19px; height:19px; display:flex; align-items:center; justify-content:center; border-radius:50%; box-shadow:0 0 12px rgba(212,175,55,0.4); }

        .menu-toggle { display: none; font-size: 1.35rem; color: var(--text-light); }

        /* === HERO, ESENCIA, TIENDA (mismo estilo premium) === */
        .hero { height: 100vh; display:flex; align-items:center; justify-content:center; text-align:center;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1539008835657-9e8e9680c956?q=80&w=1920') center/cover no-repeat; }
        .hero-content h1 { font-family: var(--font-heading); font-size: clamp(3.2rem,10vw,6.8rem); letter-spacing:16px; text-transform:uppercase; text-shadow:0 0 40px rgba(212,175,55,0.15); }
        .btn-gold { padding:19px 52px; background:transparent; color:var(--accent-gold); border:1.5px solid var(--accent-gold); text-transform:uppercase; letter-spacing:3px; transition:var(--transition); }
        .btn-gold:hover { background:var(--accent-gold); color:#000; box-shadow:0 0 25px rgba(212,175,55,0.5); }

        .essencia-section, .shop-section { padding:120px 5%; }
        .section-title { font-family:var(--font-heading); text-align:center; font-size:2.85rem; color:var(--accent-gold); margin-bottom:85px; }

        .product-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:45px; }
        .product-card { background:#111; overflow:hidden; transition:var(--transition); cursor:pointer; }
        .product-card:hover { transform:translateY(-12px); box-shadow:0 25px 50px rgba(0,0,0,0.6); }
        .img-container { height:520px; overflow:hidden; }
        .img-container img { width:100%; height:100%; object-fit:cover; transition:transform 1.4s ease; }
        .product-card:hover .img-container img { transform:scale(1.08); }
        .product-info { padding:32px; text-align:center; }
        .price { color:var(--accent-gold); font-size:1.15rem; }

        /* === MODAL PRODUCTO === */
        #product-modal {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9);
            display:none; align-items:center; justify-content:center; z-index:3000; padding:20px;
        }
        .modal-content {
            background:#111; max-width:960px; width:100%; border:1px solid rgba(212,175,55,0.3);
            display:flex; gap:40px; padding:40px; position:relative;
        }
        .modal-image { flex:1; }
        .modal-image img { width:100%; border-radius:4px; }
        .modal-info { flex:1; }
        .modal-info h2 { font-family:var(--font-heading); font-size:2.4rem; color:var(--accent-gold); }
        .modal-info .price { font-size:1.6rem; margin:15px 0; }
        .size-selector { display:flex; gap:12px; margin:25px 0; }
        .size-btn { padding:10px 18px; background:#1a1a1a; border:1px solid #333; color:#fff; cursor:pointer; transition:var(--transition); }
        .size-btn.active, .size-btn:hover { background:var(--accent-gold); color:#000; }

        /* === CARRITO + STRIPE === */
        .side-panel { position:fixed; top:0; right:-100%; width:410px; height:100vh; background:#0d0d0d; z-index:2001;
            padding:50px 32px; transition:0.65s cubic-bezier(0.19,1,0.22,1); }
        .side-panel.active { right:0; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); z-index:2000; display:none; }
        .overlay.active { display:block; }

        .checkout-btn {
            width:100%; padding:19px; background:var(--accent-gold); color:#000; border:none;
            font-weight:bold; text-transform:uppercase; cursor:pointer; margin-top:20px;
        }

        footer { padding:90px 20px 50px; text-align:center; background:#050505; color:#555; }
        .theme-toggle i { transition:var(--transition); }
    </style>
</head>
<body>

<nav class="navbar" id="navbar">
    <a href="#" class="logo">Ximier</a>
    <ul class="nav-links">
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#esencia">Esencia</a></li>
        <li><a href="#productos">Colección</a></li>
        <li><a href="#atelier">Atelier</a></li>
    </ul>
    <div class="nav-icons">
        <div class="theme-toggle" id="theme-toggle"><i class="fas fa-moon"></i></div>
        <div class="cart-icon-container" id="open-cart">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count">0</span>
        </div>
        <div class="menu-toggle" id="open-menu"><i class="fas fa-bars"></i></div>
    </div>
</nav>

<div class="overlay" id="common-overlay"></div>

<!-- MODAL PRODUCTO -->
<div id="product-modal">
    <div class="modal-content">
        <button onclick="closeProductModal()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:#fff; font-size:2rem; cursor:pointer;">×</button>
        <div class="modal-image" id="modal-image"></div>
        <div class="modal-info">
            <h2 id="modal-name"></h2>
            <p class="price" id="modal-price"></p>
            <p id="modal-desc" style="line-height:1.8; margin:20px 0;"></p>
            
            <div>
                <strong>Talla</strong>
                <div class="size-selector" id="size-selector"></div>
            </div>
            
            <button class="add-to-cart" onclick="addCurrentToCart()" style="width:100%; margin-top:30px;">Añadir al carrito</button>
        </div>
    </div>
</div>

<!-- CARRITO -->
<aside class="side-panel" id="cart-panel">
    <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;border-bottom:1px solid #222;padding-bottom:20px;">
        <h2 style="font-family:var(--font-heading);color:var(--accent-gold);">Tu Bolsa</h2>
        <button onclick="closeAll()" style="background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer;">×</button>
    </div>
    <div id="cart-items" style="flex-grow:1;overflow-y:auto;"></div>
    <div style="margin-top:auto;">
        <div style="display:flex;justify-content:space-between;font-size:1.35rem;margin:25px 0;">
            <span>Total</span>
            <span id="total-amount">$0 USD</span>
        </div>
        <button class="checkout-btn" onclick="initiateStripeCheckout()">Finalizar Compra con Stripe <i class="fas fa-lock"></i></button>
    </div>
</aside>

<!-- RESTO DEL HTML (hero, esencia, productos, atelier, footer) igual que antes pero con botones "Ver detalles" -->
<header class="hero" id="inicio">
    <div class="hero-content">
        <h1>Ximier</h1>
        <p>Elegancia que trasciende</p>
        <a href="#productos" class="btn-gold">Ver Colección</a>
    </div>
</header>

<section id="esencia" class="essencia-section">
    <div class="essencia-container">
        <h2>Nuestra Esencia</h2>
        <p>Ximier no nace de una tendencia, sino de una obsesión: la permanencia...</p>
    </div>
</section>

<section id="productos" class="shop-section">
    <h2 class="section-title">La Colección Nocturna</h2>
    <div class="product-grid" id="product-grid"></div>
</section>

<section id="atelier" class="atelier-section">
    <!-- video igual -->
</section>

<footer>
    <p class="logo" style="font-size:1.15rem;">Ximier</p>
    <p>© 2026 XIMIER ATELIER</p>
</footer>

<script>
    // === PRODUCTOS (datos para modal) ===
    const products = [
        { id:1, name:"Seda Medianoche", price:1400, img:"https://images.unsplash.com/photo-1566162963464-3286f9014197?q=80&w=800", desc:"Vestido largo de seda pura con caída infinita. Ideal para noches de gala." },
        { id:2, name:"Terciopelo Noir", price:1850, img:"https://images.unsplash.com/photo-1595777457583-95e059d581b8?q=80&w=800", desc:"Terciopelo italiano ultra suave. Elegancia dramática que nunca pasa de moda." },
        { id:3, name:"Brillo Astral", price:2100, img:"https://images.unsplash.com/photo-1572804013309-82a89b47afc2?q=80&w=800", desc:"Tul bordado con cristales Swarovski. Brilla como las estrellas." }
    ];

    let cart = [];
    let currentProduct = null;

    // Render productos con botón "Ver detalles"
    function renderProducts() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        products.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="img-container" onclick="showProductModal(${i})">
                    <img src="${p.img}" alt="${p.name}">
                </div>
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p class="price">$${p.price} USD</p>
                    <button class="add-to-cart" onclick="event.stopImmediatePropagation(); addToCart(${i});">Añadir</button>
                    <button onclick="event.stopImmediatePropagation(); showProductModal(${i});" style="margin-top:10px;width:100%;padding:14px;background:transparent;border:1px solid #444;color:#ccc;text-transform:uppercase;letter-spacing:1px;cursor:pointer;">Ver detalles</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Modal producto
    function showProductModal(index) {
        currentProduct = products[index];
        document.getElementById('modal-image').innerHTML = `<img src="${currentProduct.img}" alt="${currentProduct.name}">`;
        document.getElementById('modal-name').textContent = currentProduct.name;
        document.getElementById('modal-price').textContent = `$${currentProduct.price} USD`;
        document.getElementById('modal-desc').textContent = currentProduct.desc;
        
        // tallas ejemplo
        const sizesHTML = ['XS','S','M','L','XL'].map(s => `<div class="size-btn" onclick="selectSize(this)">${s}</div>`).join('');
        document.getElementById('size-selector').innerHTML = sizesHTML;
        
        document.getElementById('product-modal').style.display = 'flex';
    }
    function closeProductModal() { document.getElementById('product-modal').style.display = 'none'; }
    function selectSize(el) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
    function addCurrentToCart() {
        if (!currentProduct) return;
        cart.push({ ...currentProduct, qty: 1 });
        updateCart();
        closeProductModal();
    }

    // Carrito (igual que antes pero mejorado)
    function addToCart(index) {
        const item = {...products[index], qty:1};
        cart.push(item);
        updateCart();
    }
    function updateCart() {
        // ... (código del carrito anterior, con cantidades)
        let total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
        document.getElementById('total-amount').textContent = `$${total} USD`;
        document.getElementById('cart-count').textContent = cart.reduce((sum, item) => sum + item.qty, 0);
        // render items...
    }

    // === STRIPE CHECKOUT ===
    const stripe = Stripe('pk_test_TODO_REEMPLAZA_CON_TU_KEY'); // ← Reemplaza con tu clave pública de test

    async function initiateStripeCheckout() {
        if (cart.length === 0) return alert("Tu bolsa está vacía");
        
        // DEMO: En producción envía el carrito a tu backend
        alert("✅ Redirigiendo a Stripe Checkout...\n\n(En producción conecta con tu servidor para crear la sesión)");
        
        // Código real (descomenta cuando tengas backend):
        /*
        const response = await fetch('https://tudominio.com/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ items: cart })
        });
        const { sessionId } = await response.json();
        stripe.redirectToCheckout({ sessionId });
        */
    }

    // === TOGGLE MODO CLARO/OSCURO ===
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const icon = themeToggle.querySelector('i');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    });

    // Abrir carrito, etc. (mismo código anterior)
    document.getElementById('open-cart').onclick = () => {
        document.getElementById('cart-panel').classList.add('active');
        document.getElementById('common-overlay').classList.add('active');
    };

    function closeAll() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('common-overlay').classList.remove('active');
        document.getElementById('product-modal').style.display = 'none';
    }

    // Scroll navbar
    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 80);
    });

    // Inicializar
    window.onload = () => {
        renderProducts();
        // carga carrito de localStorage si quieres...
    };
</script>
</body>
</html>
